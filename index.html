<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bedside — Clinical Calculators</title>
  <meta name="description" content="Nine bedside calculators for nurses and doctors. Drug dose, IV drip, pump rate, weight-based dosing, infusion time, unit conversion, oxygen targets, titration, and cannula gauge check." />
  <meta name="theme-color" content="#0a0a0d" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="uploads/bedside-icon.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0d; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: system-ui, sans-serif; }
    .splash { display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .icon { width: 72px; height: 72px; border-radius: 22px; overflow: hidden; box-shadow: 0 0 40px rgba(76,141,255,.3); }
    .icon img { width: 100%; height: 100%; object-fit: cover; }
    .name { font-size: 22px; font-weight: 700; color: #eceef5; letter-spacing: -.02em; }
    .sub { font-size: 13px; color: #8891a4; }
    .loader { width: 32px; height: 3px; background: #1e2028; border-radius: 2px; overflow: hidden; margin-top: 8px; }
    .loader::after { content: ''; display: block; width: 40%; height: 100%; background: #4c8dff; border-radius: 2px; animation: load 1s ease-in-out infinite alternate; }
    @keyframes load { from { transform: translateX(0); } to { transform: translateX(150%); } }
  </style>
</head>
<body>
  <div class="splash">
    <div class="icon"><img src="uploads/bedside-icon.png" alt="Bedside" /></div>
    <div>
      <div class="name">Bedside</div>
      <div class="sub">Clinical calculators</div>
    </div>
    <div class="loader"></div>
  </div>
  <script>
    // Redirect to the app after a brief splash
    setTimeout(() => {
      window.location.replace('bedside-bundle.html');
    }, 800);
  </script>
</body>
</html>
