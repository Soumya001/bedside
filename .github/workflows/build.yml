name: Build Nculator APK
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install EAS CLI
        run: npm install -g eas-cli@latest
      - name: Install deps
        run: cd nculator && npm install --legacy-peer-deps
      - name: Setup EAS project
        run: cd nculator && bash setup-eas.sh
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: Build APK and get build ID
        id: eas_build
        run: |
          OUTPUT=$(cd nculator && eas build --platform android --profile preview --non-interactive --wait 2>&1)
          echo "$OUTPUT"
          # Extract the EAS build UUID from the "See logs:" URL line
          BUILD_ID=$(echo "$OUTPUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
          echo "build_id=$BUILD_ID"
          echo "build_id=$BUILD_ID" >> $GITHUB_OUTPUT
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      - name: Get APK download URL from EAS
        id: get_apk
        run: |
          BUILD_ID="${{ steps.eas_build.outputs.build_id }}"
          echo "Querying EAS for build $BUILD_ID"
          RESPONSE=$(curl -s -X POST https://api.expo.dev/graphql \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.EXPO_TOKEN }}" \
            -d "{\"query\":\"query { builds { byId(buildId: \\\"$BUILD_ID\\\") { status artifacts { applicationArchiveUrl } } } }\"}")
          echo "EAS response: $RESPONSE"
          APK_URL=$(echo "$RESPONSE" | grep -oE '"applicationArchiveUrl":"[^"]*"' | sed 's/"applicationArchiveUrl":"//;s/"$//')
          echo "APK URL: $APK_URL"
          echo "apk_url=$APK_URL" >> $GITHUB_OUTPUT
      - name: Download APK
        run: |
          APK_URL="${{ steps.get_apk.outputs.apk_url }}"
          echo "Downloading from: $APK_URL"
          curl -fL "$APK_URL" -o nculator-preview.apk
          ls -lh nculator-preview.apk
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Nculator v${{ github.run_number }}"
          body: |
            Android APK — built automatically by EAS Build.

            **Download** `nculator-preview.apk` below and install it on your Android device.

            Built from commit ${{ github.sha }}
          files: nculator-preview.apk
          draft: false
          prerelease: false
